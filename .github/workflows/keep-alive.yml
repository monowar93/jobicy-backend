# Ping Upstash Redis REST API every ~4 days so the free-tier database stays active.
# Upstash deletes databases after 7 days of inactivity.
name: Keep Upstash Redis Alive

on:
  schedule:
    # Midnight UTC on days 1, 5, 9, 13, 17, 21, 25, 29 (~every 4 days)
    - cron: '0 0 */4 * *'
  workflow_dispatch:

jobs:
  ping-redis:
    runs-on: ubuntu-latest
    steps:
      - name: SET keepalive key via Upstash REST API
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: |
          set -euo pipefail
          TIMESTAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "Pinging Upstash Redis at ${TIMESTAMP}…"
          curl --fail-with-body --silent --show-error \
            -X POST "${UPSTASH_REDIS_REST_URL}/set/keepalive/${TIMESTAMP}" \
            -H "Authorization: Bearer ${UPSTASH_REDIS_REST_TOKEN}"
          echo ""
          echo "Keepalive ping succeeded."
